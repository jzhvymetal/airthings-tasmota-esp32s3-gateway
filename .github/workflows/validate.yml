name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validators
        run: |
          python -m pip install --disable-pip-version-check pyyaml
          sudo apt-get update
          sudo apt-get install -y lua5.4
      - name: Validate repository
        run: python scripts/check_repo.py
      - name: Compile Python
        run: python -m compileall -q -x '(^|/)(Tasmota|release)/' .
      - name: Parse SmartThings Lua
        run: luac -p smartthings-edge/src/init.lua
