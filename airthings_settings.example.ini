[device]
com_port = COM8
baud = 115200
device_ip = 192.168.1.100
airthings_mac = 000000000000
airthings_address_type = 0

[wifi]
ssid = CHANGE_ME
password = CHANGE_ME

[build]
environment = tasmota32s3-airthings-mi32-matter
jobs = 8
app_offset = 0xE0000

[workflow]
assume_yes = 1
full_erase_on_fresh_install = 1
verify_timeout_seconds = 45

[codex]
approval_policy = never
sandbox_mode = danger-full-access

